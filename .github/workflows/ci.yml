name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  python:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Smoke test — CLI loads
        run: |
          uv run holoctl --version
          uv run holoctl --help

      - name: Smoke test — init + discovery + ticket
        shell: bash
        run: |
          set -e
          mkdir -p _ci_smoke && cd _ci_smoke
          uv run --project .. holoctl init --name ci --prefix CI --skip-compile
          mkdir app api infra
          echo '{}' > app/package.json
          echo '[project]' > api/pyproject.toml
          # Should list app + api but NOT infra (no marker)
          uv run --project .. holoctl overview | tee overview.txt
          grep -q "app" overview.txt
          grep -q "api" overview.txt
          if grep -q "^.*infra" overview.txt; then
            echo "ERROR: infra (no marker) should NOT appear"; exit 1
          fi
          # Activate developer from the latent library (since 0.9, init only
          # materializes boardmaster — other personas are opt-in).
          uv run --project .. holoctl agent add developer
          # Multi-project ticket
          uv run --project .. holoctl board add '{"title":"smoke","agent":"developer","projects":["app","api"]}'
          uv run --project .. holoctl board ls --project app | grep -q "CI-001"
          uv run --project .. holoctl board ls --project api | grep -q "CI-001"

      - name: Smoke test — multi-target compile + doctor + migration
        shell: bash
        run: |
          set -e
          mkdir -p _ci_compile && cd _ci_compile
          # Compile every supported target and verify doctor reports healthy.
          uv run --project .. holoctl init --name ci --prefix CI \
            --targets agents,claude,copilot,codex
          uv run --project .. holoctl doctor | tee doctor.txt
          grep -q "All checks passed" doctor.txt
          if grep -q "issue(s) found" doctor.txt; then
            echo "ERROR: doctor reported issues — target outputs / paths drifted"
            exit 1
          fi

          # `.codex/config.toml` must parse as valid TOML and declare the holoctl server.
          uv run --project .. python -c "
          import tomllib
          d = tomllib.loads(open('.codex/config.toml','rb').read().decode())
          assert d['mcp_servers']['holoctl']['args'] == ['serve', '--mcp'], d
          print('codex config.toml OK')"

          # Removed targets must reject with a useful error.
          uv run --project .. holoctl compile --target cursor 2>&1 | tee cursor.txt
          grep -q "Unknown compile target: cursor" cursor.txt
          grep -q "Available:" cursor.txt

          # Re-compile is idempotent — second run produces no diff in tracked outputs.
          sha_before=$(sha256sum AGENTS.md CLAUDE.md .codex/config.toml .codex/AGENTS.override.md | sort)
          uv run --project .. holoctl compile
          sha_after=$(sha256sum AGENTS.md CLAUDE.md .codex/config.toml .codex/AGENTS.override.md | sort)
          if [ "$sha_before" != "$sha_after" ]; then
            echo "ERROR: compile is not idempotent"
            diff <(echo "$sha_before") <(echo "$sha_after")
            exit 1
          fi

          # Legacy workspace (still listing retired targets) compiles silently
          # — exercises the _filter_removed_targets migration.
          cd .. && mkdir -p _ci_legacy && cd _ci_legacy
          uv run --project .. holoctl init --name legacy --skip-compile
          uv run --project .. python -c "
          import json, pathlib
          p = pathlib.Path('.holoctl/config.json')
          d = json.loads(p.read_text())
          d['targets'] = ['agents','claude','cursor','windsurf','copilot','devin','generic','codex']
          p.write_text(json.dumps(d, indent=2))"
          uv run --project .. holoctl compile | tee legacy.txt
          # Removed targets must not appear in the output as errors.
          if grep -E "compiled (cursor|windsurf|devin|generic)" legacy.txt; then
            echo "ERROR: a retired target was compiled — filter regressed"
            exit 1
          fi
          test -f AGENTS.md
          test -f CLAUDE.md
          test -f .codex/config.toml
          [ ! -d .cursor ] && [ ! -d .windsurf ] && [ ! -d .devin ]
          echo "Migration smoke OK"

      - name: Run pytest
        run: uv run pytest tests/ -q

  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    needs: python
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
      - run: uv build
      - run: uv tool run twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
