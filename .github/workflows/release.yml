name: Release

# Publishes when CI ("test") succeeds on main, or on manual dispatch. The
# version comes from pyproject.toml; the workflow creates the v<version> tag
# and GitHub Release itself, so no tag push is required. A guard skips
# versions that are already released (idempotent on every green CI run).
#
# PyPI uses Trusted Publishers (OIDC) pinned to this workflow filename
# (release.yml) and the `pypi` environment — keep both stable.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write    # create the tag + GitHub Release
  id-token: write    # PyPI OIDC

jobs:
  gate:
    name: Decide whether to release
    runs-on: ubuntu-latest
    # Only after a successful CI run from a push to main, or a manual dispatch.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.event == 'push')
    outputs:
      release: ${{ steps.decide.outputs.release }}
      version: ${{ steps.decide.outputs.version }}
      sha: ${{ steps.decide.outputs.sha }}
    steps:
      - name: Resolve commit
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.sha.outputs.sha }}
      - name: Resolve version + skip if already released
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          VERSION="$(grep -E '^version = ' pyproject.toml | head -1 | sed -E 's/.*"(.*)".*/\1/')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=${{ steps.sha.outputs.sha }}" >> "$GITHUB_OUTPUT"
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "v$VERSION already released — skipping."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Will release v$VERSION."
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build wheel + sdist
    needs: gate
    if: needs.gate.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.sha }}
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
      - run: uv build
      - run: uv tool run twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30

  publish-pypi:
    name: Publish to PyPI
    needs: [gate, build]
    if: needs.gate.outputs.release == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/holoctl
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verify-metadata: true
          skip-existing: true   # idempotent re-runs

  github-release:
    name: Create GitHub Release
    needs: [gate, publish-pypi]
    if: needs.gate.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.sha }}
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          set -e
          VERSION="${{ needs.gate.outputs.version }}"
          # Slice between `## [VERSION]` and the next `## [`.
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' holoctl/CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](holoctl/CHANGELOG.md) for details."
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo ""
            echo "---"
            echo ""
            echo "Install: \`uv tool install holoctl==$VERSION\` (or \`pipx install holoctl==$VERSION\`)."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.gate.outputs.version }}
          name: v${{ needs.gate.outputs.version }}
          target_commitish: ${{ needs.gate.outputs.sha }}
          body: ${{ steps.notes.outputs.notes }}
          files: |
            dist/*.whl
            dist/*.tar.gz
          draft: false
          prerelease: false
