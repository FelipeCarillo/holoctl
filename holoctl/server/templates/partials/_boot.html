{# Inline boot script: applies theme + sidebar state before first paint to
   avoid the dark→light flash on navigation. Kept terse on purpose. #}
<script>(function(){try{var t=localStorage.getItem('holoctl-theme')||'dark';document.documentElement.setAttribute('data-theme',t);if(localStorage.getItem('holoctl-sidebar')==='collapsed'){document.documentElement.setAttribute('data-sidebar','collapsed');}}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
