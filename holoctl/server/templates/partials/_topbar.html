<a href="/" class="topbar-brand" title="holoctl home">
  <span class="logo">P</span>
  <span class="brand-name">holo<span class="brand-accent">ctl</span></span>
</a>
<div class="topbar-breadcrumb">
{%- for b in breadcrumbs or [] -%}
  {%- if b.get('href') -%}
    <a href="{{ b['href'] }}">{{ b['label'] }}</a><span class="sep">/</span>
  {%- else -%}
    <span>{{ b['label'] }}</span>
  {%- endif -%}
{%- endfor -%}
</div>
<div class="topbar-actions">
  {{ actions | safe }}
  <button class="icon-btn" onclick="__toggleTheme()" title="Toggle theme">
    <span class="theme-icon-dark">{% include "icons/moon.svg" %}</span>
    <span class="theme-icon-light">{% include "icons/sun.svg" %}</span>
  </button>
</div>
