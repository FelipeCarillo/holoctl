<div class="detail-header">
  <div class="detail-header-row" data-id="{{ ticket.id }}" data-status="{{ status }}" data-p="{{ priority }}">
    <span class="kc-prio-dot" data-p="{{ priority }}" title="priority {{ priority }}"></span>
    <span class="detail-id">{{ ticket.id }}</span>
    <span class="lr-status" data-status="{{ status }}">{{ status }}</span>
    <span class="lr-prio-pill" data-p="{{ priority }}">{{ priority }}</span>
  </div>
  <h1 class="detail-title">{{ ticket.title }}</h1>
</div>
