<div class="detail-toolbar">
  <a class="back-link" href="/project/{{ alias }}/board">
    <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Board
  </a>
  <div class="detail-actions">
    <button type="button" class="btn-sm lr-edit lr-status" data-edit-field="status" data-status="{{ status }}" data-detail-row data-id="{{ ticket.id }}">
      Move ▾
    </button>
    <button type="button" class="btn-sm" data-card-menu data-detail-menu data-id="{{ ticket.id }}" data-status="{{ status }}" aria-label="More actions">⋯</button>
  </div>
</div>
