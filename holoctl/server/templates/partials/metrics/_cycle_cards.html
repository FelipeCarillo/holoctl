<div class="metrics-card" id="metrics-cycle">
  <div class="metrics-card-title">Cycle Time <span class="metrics-card-subtitle">creation → done</span></div>
  {% if cycle.count == 0 %}
  <div class="metrics-empty">No completed tickets with timestamps yet.</div>
  {% else %}
  <div class="metrics-stat-row">
    <div class="metrics-stat">
      <span class="metrics-stat-value">{{ cycle.mean }}</span>
      <span class="metrics-stat-unit">d</span>
      <span class="metrics-stat-label">mean</span>
    </div>
    <div class="metrics-stat">
      <span class="metrics-stat-value">{{ cycle.median }}</span>
      <span class="metrics-stat-unit">d</span>
      <span class="metrics-stat-label">median</span>
    </div>
    <div class="metrics-stat metrics-stat-accent">
      <span class="metrics-stat-value">{{ cycle.p95 }}</span>
      <span class="metrics-stat-unit">d</span>
      <span class="metrics-stat-label">p95</span>
    </div>
  </div>
  <div class="metrics-card-footer">
    <span class="metrics-count-chip">{{ cycle.count }} ticket{{ "s" if cycle.count != 1 else "" }}</span>
  </div>
  {% endif %}
</div>
