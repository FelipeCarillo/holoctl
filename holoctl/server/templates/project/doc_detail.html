{% extends "base.html" %}
{% block content %}
<a class="back-link" href="/project/{{ alias }}/{{ kind }}">
  <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
  Back to {{ kind_label }}
</a>
<div class="detail-page">
  <div class="detail-header">
    <div class="detail-title">{{ doc_title }}</div>
  </div>
  {% if meta_rows %}
  <div class="detail-grid">
    <div class="detail-main">
      <div class="detail-section">
        <div class="detail-section-body">{{ body_html | safe }}</div>
      </div>
    </div>
    <div class="detail-sidebar">
      {% for row in meta_rows %}
      <div>
        <div class="detail-field-label">{{ row.label }}</div>
        <div class="detail-field-value mono">{{ row.value }}</div>
      </div>
      {% endfor %}
    </div>
  </div>
  {% else %}
  <div class="detail-main">
    <div class="detail-section">
      <div class="detail-section-body">{{ body_html | safe }}</div>
    </div>
  </div>
  {% endif %}
</div>
{% endblock %}
