[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "projhub"
version = "0.4.1"
description = "Universal project operating system for AI coding assistants"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.11"
authors = [{ name = "Felipe Carillo" }]
keywords = [
  "ai", "project-management", "kanban", "claude-code", "cursor",
  "windsurf", "copilot", "aider", "agents", "cli",
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development",
  "Topic :: Software Development :: Build Tools",
  "Operating System :: OS Independent",
  "Environment :: Console",
  "Environment :: Web Environment",
]
dependencies = [
    "typer>=0.12",
    "rich>=13",
    "fastapi>=0.115",
    "uvicorn>=0.30",
]

[project.scripts]
projhub = "projhub.__main__:app"
phub = "projhub.__main__:app"

[project.urls]
Homepage = "https://github.com/FelipeCarillo/projhub"
Repository = "https://github.com/FelipeCarillo/projhub"

[tool.setuptools.packages.find]
where = ["."]
include = ["projhub*"]

[tool.setuptools.package-data]
projhub = [
    "templates/commands/*.md",
    "server/static/*",
]

[tool.uv]
package = true
