[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "holoctl"
version = "0.10.0"
description = "Universal project operating system for AI coding assistants"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.11"
authors = [{ name = "Felipe Carillo" }]
keywords = [
  "ai", "project-management", "kanban", "claude-code", "cursor",
  "windsurf", "copilot", "aider", "agents", "cli",
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development",
  "Topic :: Software Development :: Build Tools",
  "Operating System :: OS Independent",
  "Environment :: Console",
  "Environment :: Web Environment",
]
dependencies = [
    "typer>=0.12",
    "rich>=13",
    "fastapi>=0.115",
    "uvicorn>=0.30",
]

[project.scripts]
holoctl = "holoctl.__main__:app"
hctl = "holoctl.__main__:app"

[project.urls]
Homepage = "https://github.com/FelipeCarillo/holoctl"
Repository = "https://github.com/FelipeCarillo/holoctl"

[tool.setuptools.packages.find]
where = ["."]
include = ["holoctl*"]

[tool.setuptools.package-data]
holoctl = [
    "templates/commands/*.md",
    "templates/agents/*.md",
    "server/static/*",
    "CHANGELOG.md",
]

[tool.uv]
package = true

[dependency-groups]
dev = [
    "pytest>=8",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-q"
